{% extends "base.html" %}

{% block title %}All Drafts - AI History{% endblock %}

{% block topbar %}
  <span class="text-gray-300 font-medium">All Drafts</span>
{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto px-6 py-8">

  <!-- Header -->
  <div class="mb-8">
    <h1 class="text-3xl font-bold text-gray-800 mb-2">AI Draft History</h1>
    <p class="text-gray-500 text-sm">All your generated assignments</p>
  </div>

  <!-- Search and filter -->
  <div class="flex gap-3 mb-6">
    <input type="text" id="search-input" placeholder="Search drafts..."
           class="flex-1 border border-gray-300 rounded-lg px-4 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"/>
    <select id="sort-select" class="border border-gray-300 rounded-lg px-4 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition">
      <option value="newest">Newest First</option>
      <option value="oldest">Oldest First</option>
      <option value="title">Title A-Z</option>
    </select>
  </div>

  <!-- Drafts list -->
  <div id="drafts-container" class="space-y-3">
    <div class="text-center py-8 text-gray-400">
      <svg class="w-12 h-12 mx-auto mb-2 opacity-40" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4v.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
      </svg>
      <p>Loading drafts...</p>
    </div>
  </div>

  <!-- Pagination -->
  <div id="pagination" class="flex justify-between items-center mt-8 pt-6 border-t border-gray-200">
    <button id="prev-btn" onclick="previousPage()" class="px-4 py-2 text-sm font-medium text-gray-600 hover:bg-gray-100 rounded-lg disabled:opacity-50 disabled:cursor-not-allowed">
      ← Previous
    </button>
    <span id="page-info" class="text-sm text-gray-600"></span>
    <button id="next-btn" onclick="nextPage()" class="px-4 py-2 text-sm font-medium text-gray-600 hover:bg-gray-100 rounded-lg disabled:opacity-50 disabled:cursor-not-allowed">
      Next →
    </button>
  </div>

</div>

<!-- Draft detail modal -->
<div id="draft-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4">
  <div class="bg-white rounded-lg shadow-xl max-w-3xl w-full max-h-96 overflow-auto">
    <!-- Modal header -->
    <div class="sticky top-0 bg-white border-b border-gray-200 px-6 py-4 flex items-start justify-between">
      <div class="flex-1 min-w-0">
        <h2 id="modal-title" class="text-lg font-semibold text-gray-800 mb-1"></h2>
        <p id="modal-date" class="text-xs text-gray-400"></p>
      </div>
      <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 flex-shrink-0">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>

    <!-- Modal content -->
    <div class="px-6 py-4">
      <!-- Description section -->
      <div class="mb-6">
        <h3 class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">Assignment Description</h3>
        <div id="modal-description" class="text-sm text-gray-700 bg-gray-50 rounded p-3 max-h-32 overflow-y-auto"></div>
      </div>

      <!-- Draft content -->
      <div>
        <h3 class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">AI Draft</h3>
        <div id="modal-draft" class="text-sm text-gray-700 bg-blue-50 rounded p-3 max-h-48 overflow-y-auto font-mono whitespace-pre-wrap break-words"></div>
      </div>
    </div>

    <!-- Modal footer -->
    <div class="sticky bottom-0 bg-gray-50 border-t border-gray-200 px-6 py-4 flex gap-3">
      <button onclick="copyFromModal()" class="flex-1 px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm font-medium transition-colors">
        Copy Draft
      </button>
      <button id="delete-modal-btn" onclick="deleteFromModal()" class="flex-1 px-4 py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg text-sm font-medium transition-colors">
        Delete
      </button>
    </div>
  </div>
</div>

{% block scripts %}
<script>
const PAGE_SIZE = 10;
let currentPage = 0;
let allDrafts = [];
let filteredDrafts = [];
let currentDraftId = null;

async function loadDrafts() {
  try {
    const token = localStorage.getItem('ext_token') || '';
    const res = await fetch(`/api/completions?limit=1000`, {
      headers: { 'Authorization': `Bearer ${token}` }
    });

    if (!res.ok) {
      const container = document.getElementById('drafts-container');
      container.innerHTML = '<div class="text-center py-8 text-red-500">Failed to load drafts</div>';
      return;
    }

    const data = await res.json();
    allDrafts = data.completions || [];
    filteredDrafts = [...allDrafts];
    currentPage = 0;
    renderPage();
  } catch(e) {
    const container = document.getElementById('drafts-container');
    container.innerHTML = `<div class="text-center py-8 text-red-500">Error: ${e.message}</div>`;
  }
}

function filterAndSort() {
  const search = document.getElementById('search-input').value.toLowerCase();
  const sort = document.getElementById('sort-select').value;

  filteredDrafts = allDrafts.filter(d =>
    !search || d.assignment_title.toLowerCase().includes(search)
  );

  if (sort === 'oldest') {
    filteredDrafts.sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
  } else if (sort === 'title') {
    filteredDrafts.sort((a, b) => a.assignment_title.localeCompare(b.assignment_title));
  } else {
    filteredDrafts.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
  }

  currentPage = 0;
  renderPage();
}

function renderPage() {
  const container = document.getElementById('drafts-container');

  if (filteredDrafts.length === 0) {
    container.innerHTML = '<div class="text-center py-8 text-gray-400">No drafts found</div>';
    document.getElementById('pagination').style.display = 'none';
    return;
  }

  const start = currentPage * PAGE_SIZE;
  const end = start + PAGE_SIZE;
  const page = filteredDrafts.slice(start, end);

  container.innerHTML = page.map(draft => `
    <button onclick="openDraft(${draft.id})"
            class="w-full text-left bg-white rounded-lg shadow-sm border border-gray-200 hover:shadow-md hover:border-gray-300 transition-all p-4">
      <div class="flex items-start justify-between mb-2">
        <h3 class="font-semibold text-gray-800 text-sm flex-1">
          ${draft.assignment_title}
        </h3>
        <span class="text-xs text-gray-400 whitespace-nowrap ml-3">
          ${new Date(draft.created_at).toLocaleDateString()}
        </span>
      </div>
      <div class="text-xs text-gray-600 line-clamp-2">
        ${draft.preview || '(No preview)'}
      </div>
    </button>
  `).join('');

  // Update pagination
  const totalPages = Math.ceil(filteredDrafts.length / PAGE_SIZE);
  document.getElementById('page-info').textContent = `Page ${currentPage + 1} of ${totalPages}`;
  document.getElementById('prev-btn').disabled = currentPage === 0;
  document.getElementById('next-btn').disabled = currentPage >= totalPages - 1;
  document.getElementById('pagination').style.display = 'flex';
}

function previousPage() {
  if (currentPage > 0) {
    currentPage--;
    renderPage();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

function nextPage() {
  const totalPages = Math.ceil(filteredDrafts.length / PAGE_SIZE);
  if (currentPage < totalPages - 1) {
    currentPage++;
    renderPage();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

async function openDraft(id) {
  try {
    const token = localStorage.getItem('ext_token') || '';
    const res = await fetch(`/api/completions/${id}`, {
      headers: { 'Authorization': `Bearer ${token}` }
    });

    if (!res.ok) {
      showToast('Failed to load draft', 'error');
      return;
    }

    const draft = await res.json();
    currentDraftId = id;

    document.getElementById('modal-title').textContent = draft.assignment_title;
    document.getElementById('modal-date').textContent = new Date(draft.created_at).toLocaleString();
    document.getElementById('modal-description').textContent = draft.assignment_description || '(No description)';
    document.getElementById('modal-draft').textContent = draft.ai_draft;

    document.getElementById('draft-modal').classList.remove('hidden');
  } catch(e) {
    showToast('Error: ' + e.message, 'error');
  }
}

function closeModal() {
  document.getElementById('draft-modal').classList.add('hidden');
  currentDraftId = null;
}

function copyFromModal() {
  const text = document.getElementById('modal-draft').textContent;
  navigator.clipboard.writeText(text).then(() => {
    showToast('Draft copied!', 'success');
  }).catch(() => {
    showToast('Failed to copy', 'error');
  });
}

async function deleteFromModal() {
  if (!confirm('Delete this draft?')) return;

  try {
    const token = localStorage.getItem('ext_token') || '';
    const res = await fetch(`/api/completions/${currentDraftId}`, {
      method: 'DELETE',
      headers: { 'Authorization': `Bearer ${token}` }
    });

    if (res.ok) {
      showToast('Draft deleted', 'success');
      closeModal();
      allDrafts = allDrafts.filter(d => d.id !== currentDraftId);
      filterAndSort();
    } else {
      showToast('Failed to delete', 'error');
    }
  } catch(e) {
    showToast('Error: ' + e.message, 'error');
  }
}

// Event listeners
document.getElementById('search-input').addEventListener('input', filterAndSort);
document.getElementById('sort-select').addEventListener('change', filterAndSort);

// Load drafts on page load
loadDrafts();
</script>
{% endblock %}

{% endblock %}
