<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Canvas AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 min-h-screen flex items-center justify-center">
  <div class="bg-gray-900 border border-gray-700 rounded-2xl shadow-2xl w-full max-w-sm mx-4 p-8">
    <div class="flex items-center gap-3 mb-8">
      <div class="w-10 h-10 bg-red-600 rounded-xl flex items-center justify-center">
        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
        </svg>
      </div>
      <div>
        <div class="text-white font-bold">Admin Panel</div>
        <div class="text-gray-400 text-xs">Localhost only</div>
      </div>
    </div>

    {% if error %}
    <div class="bg-red-900/50 border border-red-700 text-red-300 rounded-lg px-4 py-2.5 text-sm mb-4">
      {{ error }}
    </div>
    {% endif %}

    <form method="POST">
      <label class="block text-xs text-gray-400 font-medium uppercase tracking-wide mb-1.5">
        Admin Password
      </label>
      <input type="password" name="password" autofocus required
             class="w-full bg-gray-800 border border-gray-600 text-white rounded-lg px-4 py-2.5
                    text-sm focus:ring-2 focus:ring-red-500 focus:border-transparent outline-none mb-4">
      <button type="submit"
              class="w-full bg-red-600 hover:bg-red-700 text-white font-semibold py-2.5 rounded-lg transition-colors">
        Enter Admin Panel
      </button>
    </form>
  </div>
</body>
</html>
